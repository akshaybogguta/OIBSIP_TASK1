<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">

        <header>
            <div class="logo">
                <img src="images/spotify-logo.png" alt="Spotify Logo">
            </div>

            <nav>
                <ul>
                    <li><a href="#">Premium</a></li>
                    <li><a href="#">Support</a></li>
                    <li><a href="#">Download</a></li>
                    <li><a href="#">Sign Up</a></li>
                </ul>
            </nav>
        </header>

        <div class="content">

            <div class="text-box">
                <h1>Music for <br> Everyone.</h1>

                <p>
                    Millions of songs. No credit card needed.
                    Discover playlists, artists and podcasts you love.
                </p>

                <a href="#" class="btn">GET SPOTIFY FREE</a>
            </div>

            <div class="image-box">
                <img src="images/phone-mockup.png" alt="Spotify App">
            </div>

        </div>

    </section>

</body>
</html>
